version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: student_task_manager_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - student-task-network

  backend:
    build: ./backend
    container_name: student_task_manager_backend
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://root:example@mongodb:27017/student_task_manager?authSource=admin
      JWT_SECRET: your_jwt_secret_key
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - student-task-network

  frontend:
    build: ./frontend
    container_name: student_task_manager_frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - student-task-network

volumes:
  mongodb_data:

networks:
  student-task-network:
    driver: bridge
